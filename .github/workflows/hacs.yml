name: HACS Validation

# Manual only for now: this fails until the remaining hacs/default
# submission requirements in HACS_CHECKLIST.md (license, topics, brand
# assets) are done. Re-enable push/pull_request triggers once ready
# to actually submit.
on:
  workflow_dispatch:

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
